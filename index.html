<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Docability</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 400px;
    margin: auto;
    background: linear-gradient(to right);
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: transform 0.2s;
  }

  .container:hover {
    transform: scale(1.01);
  }

  input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background-color: #4CAF50;
    color: white;
  }

  #result {
    margin-top: 20px;
    font-size: 22px;
    padding: 15px;
    border-radius: 10px;
  }
/* Chrome, Safari, Edge */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

/* Firefox */
input[type=number] {
  -moz-appearance: textfield;
}
input:focus, select:focus {
  outline: none;
  border: 1px solid #4CAF50;
}
</style>
</head>
<body>
<div class="container">

<h1>🍺 Docability Calculator</h1>

<div>
  <label>Currency:</label><br>
  <select id="currency">
    <option value="EUR">€</option>
    <option value="HUF">HUF</option>
    <option value="CZK">CZK</option>
    <option value="NOK">NOK</option>
    <option value="CAD">CAD</option>
  </select>
</div>

<div>
  <label>Where are you buying alcohol?</label><br>
  <select id="country">
    <option value="FIN">Finland</option>
    <option value="NOR">Norway</option>
    <option value="GER">Germany</option>
  </select>
</div>

<div>
  <input type="number" id="percent" placeholder="Alcohol (%)" step="0.1"><br>
 <input type="number" id="volume" placeholder="Volume (l)" step="0.01">
  <input type="number" id="price" placeholder="Price">
</div>

<button onclick="calculate()">Calculate</button>

<div id="result" style="padding:20px; border-radius:10px; display:inline-block;"></div>

<script>
function calculate() {
  let percent = parseFloat(document.getElementById("percent").value);
  let volume = parseFloat(document.getElementById("volume").value);
  let price = parseFloat(document.getElementById("price").value);
  let currency = document.getElementById("currency").value;
  let country = document.getElementById("country").value;

  if (!percent || !volume || !price) {
    document.getElementById("result").innerText = "Please fill in all fields!";
    return;
  }

  // Kiinteät valuuttakurssit (päivitä tarvittaessa)
  const rates = {
    EUR: 1,
    NOK: 11.0,
    CZK: 24.5,
    HUF: 390,
    CAD: 1.5
  };

  // Muunna euroiksi
  let priceEUR = price / rates[currency];

  // Lasku (Excel-kaava)
  let value = (volume * percent) / priceEUR;

  // Scale
  let grade = "";

  if (country === "NOR") {
    if (value > 1.05) grade = "A";
    else if (value >= 0.85) grade = "B";
    else if (value >= 0.65) grade = "C";
    else if (value >= 0.50) grade = "D";
    else grade = "E";
  }

  if (country === "FIN") {
  if (value >= 1.45) grade = "A";
  else if (value >= 1.31) grade = "B";
  else if (value >= 1.17) grade = "C";
  else if (value >= 1.03) grade = "D";
  else if (value >= 0.89) grade = "E";
  else if (value >= 0.75) grade = "F";
  else if (value >= 0.61) grade = "G";
  else if (value >= 0.47) grade = "H";
  else if (value >= 0.33) grade = "I";
  else if (value >= 0.20) grade = "J";
  else grade = "J";
  }

  if (country === "GER") {
    if (value > 3.00) grade = "A";
    else if (value >= 2.60) grade = "B";
    else if (value >= 2.40) grade = "C";
    else if (value >= 2.20) grade = "D";
    else grade = "E";
  }

  // Värit
 // Värit
let color = "";

// 🇫🇮 SUOMI (A–J)
let color = "";

// 🇫🇮 SUOMI
if (country === "FIN") {
  const gradeColorsFIN = {
    A: "#2e7d32",
    B: "#388e3c",
    C: "#4CAF50",
    D: "#8BC34A",
    E: "#CDDC39",
    F: "#FFEB3B",
    G: "#FFC107",
    H: "#FF9800",
    I: "#F44336",
    J: "#b71c1c"
  };

  color = gradeColorsFIN[grade] || "#cccccc";
}

// 🇳🇴 🇩🇪
else {
  if (grade === "A") color = "#4CAF50";
  else if (grade === "B") color = "#8BC34A";
  else if (grade === "C") color = "#FFEB3B";
  else if (grade === "D") color = "#FF9800";
  else if (grade === "E") color = "#F44336";
  else color = "#cccccc";
}
</script>
</div>
</body>
</html>
